name: Daily job finder

on:
  schedule:
    # 07:00 UTC every day (~08:00 Ireland winter / 08:00-09:00 summer).
    - cron: "0 7 * * *"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

permissions:
  contents: write          # needed to commit the results back

jobs:
  find-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job finder
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python main.py

      - name: Commit results
        run: |
          git config user.name "job-finder-bot"
          git config user.email "actions@github.com"
          git add jobs/ latest.md seen.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "jobs: update for $(date -u +%Y-%m-%d)"
            git push
          fi
